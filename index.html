<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Påskeeggjakt</title>
  <style>
    :root {
      --bg: #fffbf0;
      --card: #ffffff;
      --primary: #e8a838;
      --primary-dark: #c88a20;
      --text: #3a2e1e;
      --text-light: #7a6a4e;
      --success: #4a8a4a;
      --error: #c0392b;
      --border: #e8d9b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #app { width: 100%; max-width: 480px; }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      border: 1px solid var(--border);
    }

    .header { text-align: center; margin-bottom: 24px; }
    .egg-icon { font-size: 52px; margin-bottom: 10px; }
    h1 { font-size: 24px; color: var(--primary-dark); margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: var(--text-light); }
    .intro { font-size: 14px; color: var(--text); line-height: 1.55; margin-bottom: 8px; font-style: italic; }
    .intro-sign { font-weight: 600; margin-top: 4px; }

    .username-display {
      font-size: 13px;
      color: var(--text-light);
      text-align: right;
      margin-bottom: 12px;
    }

    .progress { margin-bottom: 20px; }
    .progress-label { font-size: 13px; color: var(--text-light); margin-bottom: 6px; }
    .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.4s ease; }

    .question-text { font-size: 17px; font-weight: 600; line-height: 1.45; margin-bottom: 20px; }

    .question-image { text-align: center; margin-bottom: 16px; }
    .question-image img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 12px;
      object-fit: cover;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      color: var(--text);
      background: white;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--primary); }
    input[type="text"]:disabled { background: #f8f4ec; color: #aaa; }

    .input-group { display: flex; flex-direction: column; gap: 12px; }

    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

    .option {
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      background: white;
      text-align: left;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }
    .option:hover:not(:disabled) { background: #fff8e8; border-color: var(--primary); }
    .option.selected { background: #fef3d0; border-color: var(--primary); font-weight: 600; }
    .option:disabled { cursor: not-allowed; opacity: 0.6; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .feedback {
      margin-top: 14px;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
    }
    .feedback.error { background: #fdf0ef; color: var(--error); border: 1px solid #f5c6c2; }
    .feedback.success { background: #f0f9f0; color: var(--success); border: 1px solid #b8e0b8; }

    .codeword-section {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .codeword-section p { font-size: 14px; color: var(--text-light); margin-bottom: 12px; }

    .final-card { text-align: center; }
    .final-card .egg-icon { font-size: 64px; }
    .final-card h2 { font-size: 26px; color: var(--primary-dark); margin-bottom: 10px; }
    .final-card .lead { font-size: 15px; color: var(--text-light); }

    .location-box {
      background: #fff8e8;
      border: 2px solid var(--primary);
      border-radius: 16px;
      padding: 20px 18px;
      margin-top: 22px;
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
      font-weight: 500;
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>

// ================================================================

//  Skriv inn hvor hvert påskeegg er gjemt.

// ================================================================

    },
    {

  ],

    {
      type: "text",

    {

      question: "Hva heter han her?",
      image: "pusen.jpg",

    },

    },
    {
      type: "text",
      question: "Nevn minst 6 deltakere på årets Boksen. Bare fornavn, og bruk mellomrom mellom navnene.",
      answerMode: "alphabetical-subset",
      minCount: 6,
      validNames: ["benedicte", "frode", "morten", "tuva", "anette", "emil",
                   "kasper", "margrete", "erik", "jon", "tomine", "sofie", "tim"]
    }
  ]
};


// ================================================================
//  APP-LOGIKK – ikke rediger nedenfor her
// ================================================================

// Fletter felles og individuelle spørsmål: [F1, I1, F2, I2, F3, I3, F4, I4]
function getQuestions(user) {
  const result = [];
  for (let i = 0; i < SHARED_QUESTIONS.length; i++) {
    result.push(SHARED_QUESTIONS[i]);
    result.push(INDIVIDUAL_QUESTIONS[user][i]);
  }
  return result;
}

const VALID_USERS = ["fredrik", "aurora", "marthe"];
const CODEWORD    = "påskeharen";

let state = {
  screen: "username",
  user: null,
  questionIndex: 0,
  inputValue: "",
  selectedOption: null,
  feedback: null,
  awaitingCodeword: false,
  codewordInput: "",
  codewordFeedback: null
};

// ---- Render ----

function render() {
  const app = document.getElementById("app");
  if (state.screen === "username")  app.innerHTML = renderUsername();
  else if (state.screen === "question") app.innerHTML = renderQuestion();
  else if (state.screen === "final")    app.innerHTML = renderFinal();
  attachListeners();
}

function renderUsername() {
  return `
    <div class="card">
      <div class="header">
        <div class="egg-icon">🐣</div>
        <h1>Påskeeggjakt!</h1>
        <p class="intro">yeyeye! Trodde dere kunne slappe av i påsken?</p>
        <p class="intro">Eggene mine er gjemt — og de gir seg ikke uten kamp. Svar riktig på spørsmål, og løs oppgavene, og kanskje, kanskje, avslører jeg hvor jeg har gjemt dem.</p>
        <p class="intro">Lykke til. Dere trenger det.</p>
        <p class="intro intro-sign">— Påskeharen 🐇</p>
        <p class="subtitle">Skriv inn brukernavnet ditt for å starte</p>
      </div>
      <div class="input-group">
        <input type="text" id="username-input" placeholder="Brukernavn"
          autocomplete="off" autocorrect="off" autocapitalize="off"
          value="${esc(state.inputValue)}">
        <button class="btn btn-primary" id="username-btn">Start jakten →</button>
      </div>
      ${state.feedback ? feedback(state.feedback) : ""}
    </div>`;
}

function renderQuestion() {
  const q     = getQuestions(state.user)[state.questionIndex];
  const total = getQuestions(state.user).length;
  const pct   = (state.questionIndex / total) * 100;
  return `
    <div class="card">
      <div class="username-display">👤 ${esc(state.user)}</div>
      <div class="progress">
        <div class="progress-label">Spørsmål ${state.questionIndex + 1} av ${total}</div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
      </div>
      ${q.image ? `<div class="question-image"><img src="${esc(q.image)}" alt=""></div>` : ""}
      <div class="question-text">${esc(q.question)}</div>
      ${q.type === "text" ? renderTextQ() : renderMultipleQ(q)}
      ${state.feedback ? feedback(state.feedback) : ""}
      ${state.awaitingCodeword ? renderCodeword() : ""}
    </div>`;
}

function renderTextQ() {
  const locked = state.awaitingCodeword;
  return `
    <div class="input-group">
      <input type="text" id="answer-input" placeholder="Ditt svar…"
        autocomplete="off" autocorrect="off"
        value="${esc(state.inputValue)}" ${locked ? "disabled" : ""}>
      <button class="btn btn-primary" id="answer-btn" ${locked ? "disabled" : ""}>Svar →</button>
    </div>`;
}

function renderMultipleQ(q) {
  const locked = state.awaitingCodeword;
  const opts = q.options.map(opt => `
    <button class="option ${state.selectedOption === opt ? "selected" : ""}"
      data-option="${esc(opt)}" ${locked ? "disabled" : ""}>
      ${esc(opt)}
    </button>`).join("");
  return `
    <div class="options">${opts}</div>
    <button class="btn btn-primary" id="answer-btn"
      ${!state.selectedOption || locked ? "disabled" : ""}>Svar →</button>`;
}

function renderCodeword() {
  return `
    <div class="codeword-section">
      <p>🔒 Skriv inn kodeordet for å prøve igjen:</p>
      <div class="input-group">
        <input type="text" id="codeword-input" placeholder="Kodeord…"
          autocomplete="off" autocorrect="off"
          value="${esc(state.codewordInput)}">
        <button class="btn btn-primary" id="codeword-btn">Lås opp</button>
      </div>
      ${state.codewordFeedback ? feedback(state.codewordFeedback) : ""}
    </div>`;
}

function renderFinal() {
  return `
    <div class="card final-card">
      <div class="egg-icon">🥚🐰🥚</div>
      <h2>Gratulerer, ${esc(capitalize(state.user))}!</h2>
      <p class="lead">Du har fullført påskeeggjakt!</p>
      <div class="location-box">🗺️ ${esc(EGG_LOCATIONS[state.user])}</div>
    </div>`;
}

function feedback(f) {
  return `<div class="feedback ${f.type}">${f.message}</div>`;
}

// ---- Event listeners ----

function attachListeners() {
  on("username-btn", "click", handleUsernameSubmit);
  onInput("username-input", v => { state.inputValue = v; });
  onEnter("username-input", handleUsernameSubmit);
  focusIfPresent("username-input");

  on("answer-btn", "click", handleAnswerSubmit);
  onInput("answer-input", v => { state.inputValue = v; });
  onEnter("answer-input", handleAnswerSubmit);
  focusIfPresent("answer-input");

  document.querySelectorAll(".option").forEach(btn => {
    btn.addEventListener("click", () => {
      if (state.awaitingCodeword) return;
      state.selectedOption = btn.dataset.option;
      state.feedback = null;
      render();
    });
  });

  on("codeword-btn", "click", handleCodewordSubmit);
  onInput("codeword-input", v => { state.codewordInput = v; });
  onEnter("codeword-input", handleCodewordSubmit);
  focusIfPresent("codeword-input");
}

// ---- Handlers ----

function handleUsernameSubmit() {
  const val = state.inputValue.trim().toLowerCase();
  if (!val) return;
  if (!VALID_USERS.includes(val)) {
    state.feedback = { type: "error", message: "Ukjent brukernavn. Prøv igjen!" };
    render();
    return;
  }
  Object.assign(state, {
    user: val, screen: "question", questionIndex: 0,
    inputValue: "", feedback: null
  });
  render();
}

function handleAnswerSubmit() {
  const q = getQuestions(state.user)[state.questionIndex];
  let correct = false;

  if (q.type === "text") {
    const userAns = state.inputValue.trim().toLowerCase();
    if (q.answerMode === "alphabetical-subset") {
      const words = userAns.split(/\s+/).filter(w => w.length > 0);
      const validSet  = q.validNames.map(n => n.toLowerCase());
      const unknown   = words.filter(w => !validSet.includes(w));
      const noDupes   = new Set(words).size === words.length;
      const enough    = words.length >= q.minCount;
      if (unknown.length > 0) {
        state.feedback = { type: "error", message: `Ukjent navn: ${unknown.join(", ")}. Sjekk stavingen!` };
      } else if (!noDupes) {
        state.feedback = { type: "error", message: "Du har oppgitt samme navn flere ganger!" };
      } else if (!enough) {
        state.feedback = { type: "error", message: `Du har oppgitt ${words.length} navn – du trenger minst ${q.minCount}!` };
      }
      correct = unknown.length === 0 && noDupes && enough;
    } else {
      const valid = q.answers
        ? q.answers.map(a => a.trim().toLowerCase())
        : [q.answer.trim().toLowerCase()];
      correct = valid.includes(userAns);
    }
  } else {
    correct = !!state.selectedOption &&
      state.selectedOption.trim().toLowerCase() === q.answer.trim().toLowerCase();
  }

  if (correct) {
    const total = getQuestions(state.user).length;
    if (state.questionIndex + 1 >= total) {
      state.screen = "final";
    } else {
      Object.assign(state, {
        questionIndex: state.questionIndex + 1,
        inputValue: "", selectedOption: null, feedback: null,
        awaitingCodeword: false, codewordInput: "", codewordFeedback: null
      });
    }
  } else {
    if (q.type === "multiple") {
      state.feedback = { type: "error", message: "Feil svar! Skriv inn kodeordet for å prøve igjen." };
      state.awaitingCodeword = true;
      state.codewordInput = "";
      state.codewordFeedback = null;
    } else if (!state.feedback) {
      state.feedback = { type: "error", message: "Feil svar, prøv igjen!" };
    }
  }
  render();
}

function handleCodewordSubmit() {
  if (state.codewordInput.trim().toLowerCase() === CODEWORD) {
    Object.assign(state, {
      awaitingCodeword: false, feedback: null,
      selectedOption: null, codewordInput: "", codewordFeedback: null
    });
  } else {
    state.codewordFeedback = { type: "error", message: "Feil kodeord, prøv igjen!" };
  }
  render();
}

// ---- Helpers ----

function on(id, ev, fn)      { const el = document.getElementById(id); if (el) el.addEventListener(ev, fn); }
function onInput(id, fn)     { on(id, "input", e => fn(e.target.value)); }
function onEnter(id, fn)     { on(id, "keydown", e => { if (e.key === "Enter") fn(); }); }
function focusIfPresent(id)  { const el = document.getElementById(id); if (el) el.focus(); }
function capitalize(s)       { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
function esc(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

render();
</script>
</body>
</html>
